name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests: Frontend ────────────────────────────
  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Run Vitest
        run: npm test
        working-directory: web

  # ── Unit + integration tests: Backend ───────────────
  test-backend:
    name: Backend Go Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Run Go tests
        run: go test -v -count=1 ./...
        working-directory: server
        env:
          MONGO_URI: mongodb://localhost:27017

  # ── E2E tests: Full stack via Docker Compose ────────
  test-e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml build

      - name: Start services (with mock OpenAI)
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost/ > /dev/null && exit 0
            sleep 2
          done
          echo "Frontend failed to start within 60 seconds"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  # ── Build & push Docker images to GHCR ──────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/swati-pm/swati-home/frontend:${{ github.sha }}
            ghcr.io/swati-pm/swati-home/frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/swati-pm/swati-home/server:${{ github.sha }}
            ghcr.io/swati-pm/swati-home/server:latest

  # ── Deploy to Bunny Magic Containers ────────────────
  deploy:
    name: Deploy to Bunny Magic Containers
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy frontend container
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ secrets.BUNNYNET_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: swati-home-frontend
          image_tag: ${{ github.sha }}

      - name: Deploy server container
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ secrets.BUNNYNET_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: swati-home-backend
          image_tag: ${{ github.sha }}
