services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_ADMIN_EMAIL: ${ADMIN_EMAIL}
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_SITE_NAME: ${VITE_SITE_NAME:-Swati Aggarwal}
        VITE_SITE_FIRST_NAME: ${VITE_SITE_FIRST_NAME:-Swati}
        VITE_SESSION_KEY: ${VITE_SESSION_KEY:-swati-home-auth}
    ports:
      - "80:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOTENBERG_URL=http://gotenberg:3000
    depends_on:
      - mongo
      - gotenberg

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db

  gotenberg:
    image: gotenberg/gotenberg:8

volumes:
  mongo-data:
