# Test override: self-contained test environment with mock services
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Provides:
# - Mock OpenAI server (canned chat completion responses)
# - Test Google Client ID and Admin Email for frontend + server
# - No real API keys or secrets needed

services:
  mock-openai:
    build:
      context: ./mock-openai
      dockerfile: Dockerfile
    environment:
      - PORT=4010

  frontend:
    build:
      args:
        VITE_GOOGLE_CLIENT_ID: test-google-client-id
        VITE_ADMIN_EMAIL: test@example.com

  server:
    environment:
      - GOOGLE_CLIENT_ID=test-google-client-id
      - ADMIN_EMAIL=test@example.com
      - OPENAI_API_KEY=test-mock-key
      - OPENAI_BASE_URL=http://mock-openai:4010
      - GOTENBERG_URL=http://gotenberg:3000
    depends_on:
      - mongo
      - mock-openai
      - gotenberg

  gotenberg:
    image: gotenberg/gotenberg:8
