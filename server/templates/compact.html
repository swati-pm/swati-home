<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 12mm 14mm; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 9pt; line-height: 1.35; color: #222; }
  .header { text-align: center; margin-bottom: 8pt; }
  .name { font-size: 16pt; font-weight: bold; }
  .contact { font-size: 8pt; color: #555; margin-top: 2pt; }
  .summary { font-size: 8.5pt; color: #444; margin-bottom: 10pt; text-align: center; }
  .divider { border: none; border-top: 0.5pt solid #ccc; margin: 8pt 0; }
  .section-title { font-size: 8.5pt; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5pt; color: #000; margin: 8pt 0 5pt; }
  .role { margin-bottom: 6pt; }
  .role-header { display: flex; justify-content: space-between; align-items: baseline; }
  .company-role { font-weight: bold; font-size: 9pt; }
  .dates { font-size: 8pt; color: #666; white-space: nowrap; }
  .location { font-size: 8pt; color: #888; }
  .bullets { font-size: 8.5pt; color: #333; margin-top: 2pt; padding-left: 12pt; }
  .bullets li { margin-bottom: 1pt; }
</style>
</head>
<body>
  <div class="header">
    <div class="name">{{.Name}}</div>
    <div class="contact">{{.Email}}</div>
  </div>

  <div class="summary">{{.Summary}}</div>

  <hr class="divider">

  <div class="section-title">Experience</div>

  {{range .Experiences}}
  <div class="role">
    <div class="role-header">
      <span class="company-role">{{.Company}} — {{.Role}}</span>
      <span class="dates">{{.StartDate}}{{if .EndDate}} – {{.EndDate}}{{end}}</span>
    </div>
    {{if .Location}}<div class="location">{{.Location}}</div>{{end}}
    {{if .Bullets}}
    <ul class="bullets">
      {{range .Bullets}}<li>{{.}}</li>{{end}}
    </ul>
    {{end}}
  </div>
  {{end}}
</body>
</html>
