<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 16mm 16mm; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10pt; line-height: 1.45; color: #1e293b; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3pt solid #6d28d9; padding-bottom: 12pt; margin-bottom: 14pt; }
  .header-left { }
  .name { font-size: 24pt; font-weight: 800; color: #0f172a; letter-spacing: -0.5pt; }
  .header-right { text-align: right; font-size: 9pt; color: #64748b; }
  .summary { font-size: 9.5pt; color: #475569; margin-bottom: 18pt; line-height: 1.5; }
  .section-title { font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 2pt; color: #6d28d9; margin: 16pt 0 10pt; }
  .role { display: flex; margin-bottom: 12pt; }
  .role-bar { width: 3pt; background: #6d28d9; border-radius: 2pt; margin-right: 12pt; flex-shrink: 0; }
  .role-content { flex: 1; }
  .role-top { display: flex; justify-content: space-between; align-items: baseline; }
  .company { font-weight: 700; font-size: 10.5pt; color: #0f172a; }
  .dates { font-size: 8.5pt; color: #94a3b8; white-space: nowrap; }
  .title-line { font-size: 9.5pt; color: #6d28d9; font-weight: 600; }
  .location { font-size: 8.5pt; color: #94a3b8; }
  ul { margin: 3pt 0 0 14pt; }
  li { font-size: 9.5pt; margin-bottom: 1.5pt; color: #334155; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="name">{{.Name}}</div>
    </div>
    <div class="header-right">
      {{.Email}}
    </div>
  </div>

  <div class="summary">{{.Summary}}</div>

  <div class="section-title">Experience</div>

  {{range .Experiences}}
  <div class="role">
    <div class="role-bar"></div>
    <div class="role-content">
      <div class="role-top">
        <span class="company">{{.Company}}</span>
        <span class="dates">{{.StartDate}}{{if .EndDate}} – {{.EndDate}}{{end}}</span>
      </div>
      <div class="title-line">{{.Role}}</div>
      {{if .Location}}<div class="location">{{.Location}}</div>{{end}}
      {{if .Bullets}}
      <ul>
        {{range .Bullets}}<li>{{.}}</li>{{end}}
      </ul>
      {{end}}
    </div>
  </div>
  {{end}}
</body>
</html>
